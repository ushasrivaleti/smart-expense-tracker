<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTrack Admin | Feedback Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container { padding: 40px; max-width: 1000px; margin: 0 auto; }
        .feedback-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .feedback-card { padding: 20px; transition: transform 0.2s; }
        .feedback-card:hover { transform: translateY(-5px); }
        .fb-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
        .fb-name { font-weight: 600; font-size: 1.1rem; }
        .fb-email { font-size: 0.85rem; color: var(--text-secondary); }
        .fb-rating { color: #f59e0b; font-weight: bold; }
        .fb-date { font-size: 0.8rem; opacity: 0.7; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <header class="top-header" style="margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px;">
            <div class="header-title">
                <h1>Feedback Administration</h1>
                <p>View what users are saying about SmartTrack.</p>
            </div>
            <a href="index.html" class="btn-secondary" style="text-decoration: none;">Back to App</a>
        </header>

        <div id="loading" style="text-align: center; padding: 40px;">
            <h3>Loading feedback...</h3>
        </div>
        
        <div id="error-message" style="display: none; color: var(--error); text-align: center; padding: 20px;">
            <h3>Failed to load. Is the backend server running?</h3>
        </div>

        <div class="feedback-grid" id="feedback-grid">
            <!-- Filled via JS -->
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
